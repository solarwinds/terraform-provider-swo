# Terraform Provider release workflow.
name: Release

# This GitHub action creates a release when a tag that matches the pattern
# "v*" (e.g. v0.1.0) is created.
on:
  push:
    tags:
      - 'v*'

# Releases need permissions to read and write the repository contents.
# GitHub considers creating releases and uploading assets as writing contents.
permissions:
  contents: write
  id-token: write

jobs:
  docs-verify:
    name: Check that docs are up to date
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install Terraform (for formatting)
        uses: hashicorp/setup-terraform@v3
        with:
          # We can safely use latest; it's for formatting only
          terraform_version: latest
      - name: Run go generate
        run: go generate ./...
      - name: Fail if generated artifacts differ
        run: git diff --quiet --exit-code

  goreleaser:
    runs-on: ubuntu-latest
    needs: [docs-verify]
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          # Allow goreleaser to access older tag information.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@72b6676b71ab476b77e676928516f6982eef7a41 # v5.3.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Checkout solarwinds-actions/gha-signing
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/checkout@v4
        with:
          repository: solarwinds-actions/gha-signing
          token: ${{ secrets.FGPAT_ENOPS_7950_SOLARWINDS_ACTIONS }}
          ref: v1
          path: ./.github/actions/gha-signing
      - name: Build binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v1"
          args: build --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          SWO_ISSUER_ID: ${{ secrets.SWO_ISSUER_ID }}
          SWO_KEY_ID: ${{ secrets.SWO_KEY_ID }}
          SWO_MAC_P8_FILE: ${{ secrets.SWO_MAC_P8_FILE }}
          SWO_MAC_P12_CERT: ${{ secrets.SWO_MAC_P12_CERT }}
          SWO_P12_PASSWORD: ${{ secrets.SWO_P12_PASSWORD }}
      - name: Azure Login (Federated Identity)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Sign Files
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: ./.github/actions/gha-signing/ats-sign
        with:
          files-to-sign: "*.exe,*.dll"
          cert-profile: ${{ vars.ATS_CERT_PROFILE }}
      - name: Run GoReleaser
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v1"
          args: release --skip-build
        env:
          # GitHub sets the GITHUB_TOKEN secret automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          SWO_ISSUER_ID: ${{ secrets.SWO_ISSUER_ID }}
          SWO_KEY_ID: ${{ secrets.SWO_KEY_ID }}
          SWO_MAC_P8_FILE: ${{ secrets.SWO_MAC_P8_FILE }}
          SWO_MAC_P12_CERT: ${{ secrets.SWO_MAC_P12_CERT }}
          SWO_P12_PASSWORD: ${{ secrets.SWO_P12_PASSWORD }}
